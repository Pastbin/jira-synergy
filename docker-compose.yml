version: "3.8"

services:
  db:
    image: postgres:18
    container_name: jira-synergy-db
    restart: always
    environment:
      # Использование переменных окружения из .env файла
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # Проброс портов для БД
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/18/data

  app:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: jira-synergy-app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
    ports:
      - "3000:3000"
    depends_on:
      - db

volumes:
  postgres_data:
